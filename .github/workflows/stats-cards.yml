name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'scripts/generate_repo_cards.py'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats cards
        uses: anuraghazra/github-readme-stats@master
        with:
          username: xiaoweiChen

      - name: Move generated cards
        run: |
          mkdir -p profile/repos
          mv *.svg profile/repos/ || true

      - name: Update README repo cards
        run: python scripts/generate_repo_cards.py

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile README.md
          # 仅当有实际变更时才提交，避免空提交触发循环
          git diff --cached --quiet && exit 0
          git commit -m "Update README cards and repo links"
          git push